name: Sentinel Auto-Fix
on:
  issues:
    types: [opened]

jobs:
  fix-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sentinel Agent Execution
        # We use the models-action which has access to the free GitHub Models tier
        uses: github/gh-models-action@v1
        with:
          # This tells the agent to use your Markdown instructions as the prompt
          instruction-file: .github/workflows/sentinel-auto-fix.md
          # Choose a powerful free model from the GitHub Marketplace
          model: gpt-4o
        env:
          # This is the built-in token that gives the AI permission to code
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
